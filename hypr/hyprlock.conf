# GENERAL
general {
    no_fade_in = false
    no_fade_out = true
    disable_loading_bar = false
    hide_cursor = true
    immediate_render = true
}

# BACKGROUND
background {
    monitor =
    # path = $BACKGROUND_PATH
    blur_passes = 2 # 0 disables blur
    color = rgba(0, 0, 0, 1.0)
    # blur_passes = 1
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.8916
    vibrancy_darkness = 0.0
}



# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgb(200, 200, 200)
    font_size = 30
    position = 0, 500
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%I:%M")"
    color = rgb(200, 200, 200)
    font_size = 80
    position = 0, 400
    halign = center
    valign = center
}

 

# Authenticate box
shape {
    monitor =
    size = 500, 100
    color = rgba(0, 0, 0, 0)
    rounding = 0
    border_size = 2
    border_color = rgba(255, 255, 255, 1)
    rotate = 0
    position = 0, 0
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 75, 20
    color =rgb(0, 0, 0)
    rounding = 0
    border_size = 2
    border_color = rgb(0, 0, 0)
    rotate = 0
    position = -160, 50
    halign = center
    valign = center
    zindex = 5
}

# USER
label {
    monitor =
    text = root
    color = rgba(216, 222, 233, 0.80)
    font_size = 18
    position = -160, 50
    halign = center
    valign = center
    zindex = 5
}

