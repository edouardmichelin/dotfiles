# INPUT FIELD
input-field {
    monitor =
    size = 150, 50
    outline_thickness = -1
    dots_size = 0.1
    dots_spacing = 0.8
    dots_center = false
    outer_color = rgba(0, 0, 0, 0)
    inner_color =rgba(0, 0, 0, 0)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    placeholder_text =
    hide_input = false
    position = 0, 0
    halign = center
    valign = center
}


# NOTIFICATION
